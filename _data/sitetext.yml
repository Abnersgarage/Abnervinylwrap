  about:
    title: About
    text: From a passion project to a full-service garage, AbnersGarage is built on
      dedication, creativity, and a love for cars.
    body: My name is Abner and I started my automotive journey with a 1982 Toyota
      Pickup. I restored it with my dad Hugo and learned the fundamentals of mechanics
      and customization. After studying chemistry at UC Davis, I decided to pursue
      my passion full-time and founded AbnersGarage. We specialize in vinyl wraps,
      lighting upgrades, and performance modifications. Our goal is to bring your
      vision to life with quality parts and skilled craftsmanship.
    section: about
